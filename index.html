<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A Special Birthday 🎁</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Quicksand:wght@500;600;700&display=swap"
    rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    body {
      overflow: hidden;
      background: linear-gradient(180deg, #f8cfe0 0%, #f0acc4 50%, #e890b0 100%);
      transition: background 2s ease;
    }

    canvas {
      position: fixed;
      inset: 0;
      display: block
    }

    #hint {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: #ffe44d;
      pointer-events: none;
      z-index: 10;
      transition: opacity .6s ease, color .6s ease;
      animation: hf 2.5s ease-in-out infinite;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.4), 0 0 20px rgba(255, 228, 77, 0.3);
    }

    #hint.hidden {
      opacity: 0;
      animation: none;
    }

    @keyframes hf {

      0%,
      100% {
        opacity: .5;
        transform: translateX(-50%) translateY(0)
      }

      50% {
        opacity: 1;
        transform: translateX(-50%) translateY(-6px)
      }
    }

    #music-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 48px;
      height: 48px;
      border: none;
      border-radius: 50%;
      background: rgba(255, 255, 255, .6);
      backdrop-filter: blur(8px);
      cursor: pointer;
      font-size: 1.3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 20px rgba(100, 160, 110, .25);
      z-index: 10;
    }

    #music-btn.playing {
      animation: rs 8s linear infinite
    }

    @keyframes rs {
      to {
        transform: rotate(360deg)
      }
    }

    #vignette {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 5;
      background:
        radial-gradient(ellipse 50% 55% at 50% 42%, rgba(255, 255, 255, 0.06) 0%, transparent 100%),
        radial-gradient(ellipse at 50% 48%, transparent 22%, rgba(130, 30, 60, 0.28) 62%, rgba(80, 10, 35, 0.60) 100%);
    }

    #tilt-btn {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 22px;
      border: none;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.70);
      backdrop-filter: blur(10px);
      font-family: 'Quicksand', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      color: #c2185b;
      cursor: pointer;
      z-index: 20;
      box-shadow: 0 4px 18px rgba(194, 24, 91, 0.25);
      display: none;
      animation: hf 2.5s ease-in-out infinite;
    }
  </style>
  <script type="importmap">
    { "imports": { "three": "./three.module.min.js" } }
  </script>
</head>

<body>
  <div id="hint">Click the gift to begin ✨</div>
  <button id="music-btn" aria-label="Toggle music">🎵</button>
  <button id="tilt-btn" aria-label="Enable tilt control">📱 Enable Tilt</button>
  <audio id="bg-music" loop preload="auto" crossorigin="anonymous"
    src="https://raw.githubusercontent.com/kimberleyroche/birthday-message-site/main/happy-birthday-to-you-piano-version-13976.mp3"></audio>
  <div id="vignette"></div>

  <script type="module">
    import * as THREE from 'three';

    // ── GLOBAL ERROR LOGGING ─────────────────────────────────────────
    window.addEventListener('error', (e) => {
      console.error("Script Error:", e.message, "at", e.filename, ":", e.lineno);
    });

    // ── STATE ────────────────────────────────────────────────────────
    const hint = document.getElementById('hint');
    const musicBtn = document.getElementById('music-btn');
    const bgMusic = document.getElementById('bg-music');
    let step = 0;
    let musicStarted = false; // FIXED: Added missing variable

    class Spring {
      constructor(val, tension = 0.2, damp = 0.7) {
        this.val = val; this.target = val;
        this.vel = 0; this.tension = tension; this.damp = damp;
      }
      update() {
        this.vel += (this.target - this.val) * this.tension;
        this.vel *= this.damp;
        this.val += this.vel;
      }
    }

    // Initial physics state
    const anim = {
      gSX: new Spring(1, 0.2, 0.6), // gift scale X (bouncy)
      gSY: new Spring(1, 0.2, 0.6), // gift scale Y
      lR: new Spring(0, 0.1, 0.7),  // lid rot X
      eY: new Spring(1.4, 0.1, 0.7), // env Y (starts inside box)
      eRZ: new Spring(0, 0.15, 0.6),  // env rot Z
      fR: new Spring(0, 0.15, 0.6),   // flap rot X
      lY: new Spring(1.4, 0.12, 0.7), // letter Y (starts inside env)
      lZ: new Spring(0, 0.12, 0.7),    // letter Z 
      lRZ: new Spring(0, 0.15, 0.6),   // letter Rot Z
      lV: new Spring(0, 0.1, 0.8),    // letter visibility (opacity)
      gI: new Spring(0, 0.1, 0.8), // light intensities
      lI: new Spring(0, 0.1, 0.8),
      tI: new Spring(0, 0.1, 0.8)
    };

    // ── RENDERER ─────────────────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xffe4ec);
    scene.fog = new THREE.FogExp2(0xffe4ec, 0.022);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 1.8, 8);
    camera.lookAt(0, 1.0, 0);

    // ── RESPONSIVE DEVICE CONFIG ─────────────────────────────────────
    let deviceCfg = { camZ: 8, camY: 1.8, parallax: 1.2, parallaxY: 0.6, pixelRatio: 2, maxPfx: 35 };

    function getDeviceConfig() {
      const w = window.innerWidth;
      if (w < 768) {
        // Mobile
        return { camZ: 11, camY: 2.2, parallax: 0.4, parallaxY: 0.2, pixelRatio: 1.5, maxPfx: 12 };
      } else if (w < 1100) {
        // Tablet
        return { camZ: 9.5, camY: 2.0, parallax: 0.8, parallaxY: 0.4, pixelRatio: 1.5, maxPfx: 20 };
      }
      // Desktop
      return { camZ: 8, camY: 1.8, parallax: 1.2, parallaxY: 0.6, pixelRatio: 2, maxPfx: 35 };
    }

    function onResize() {
      const w = window.innerWidth, h = window.innerHeight;
      deviceCfg = getDeviceConfig();
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, deviceCfg.pixelRatio));
      // Reduce shadow quality on mobile for perf
      if (w < 768) {
        renderer.shadowMap.type = THREE.BasicShadowMap;
      } else {
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      }
    }
    onResize(); // apply on load

    // ── LIGHTS ───────────────────────────────────────────────────────
    scene.add(new THREE.AmbientLight(0xfff0f5, 0.75));
    const sun = new THREE.DirectionalLight(0xfffef5, 0.9); // toned down — was 1.35
    sun.position.set(5, 12, 8);
    sun.castShadow = true;
    Object.assign(sun.shadow.camera, { left: -10, right: 10, top: 10, bottom: -10, near: .5, far: 40 });
    sun.shadow.mapSize.setScalar(2048);
    scene.add(sun);

    const topLamp = new THREE.PointLight(0xffffee, 0, 15);
    topLamp.position.set(0, 6, 4);
    scene.add(topLamp);

    const giftLight = new THREE.PointLight(0xffd6e0, 0, 8);
    giftLight.position.set(0, 1.5, 0);
    scene.add(giftLight);

    const letterLight = new THREE.PointLight(0xfffef8, 0, 3); // very short range — only warms gift area
    letterLight.position.set(2.0, 3.5, 1.5); // side-top, NOT in front of letter
    scene.add(letterLight);

    // ── CINEMATIC STAGE SPOTLIGHT (above letter, soft cone) ───────────────
    const stageSpot = new THREE.SpotLight(0xfff5f8, 0, 10, Math.PI / 6, 0.55, 2.0);
    stageSpot.position.set(0, 6, 4);   // above, slightly in front
    stageSpot.target.position.set(0, 1.5, 3.5); // aimed at letter centre
    stageSpot.castShadow = false;
    scene.add(stageSpot);
    scene.add(stageSpot.target);
    // Note: letter is MeshBasicMaterial — spot only affects gift/envelope

    // ── HELPERS ──────────────────────────────────────────────────────
    const lerp = (a, b, t) => a + (b - a) * t;
    const mat = (col, o = {}) => new THREE.MeshStandardMaterial({ color: col, roughness: .65, metalness: .05, ...o });

    function addEdges(mesh) {
      const edges = new THREE.LineSegments(new THREE.EdgesGeometry(mesh.geometry), new THREE.LineBasicMaterial({ color: 0xd4bc96, transparent: true, opacity: 0.6 }));
      edges.position.z = 0.001; mesh.add(edges);
    }

    function emojiTex(emoji, size = 128) {
      const c = document.createElement('canvas');
      c.width = c.height = size;
      const x = c.getContext('2d');
      x.font = `${size * .75}px serif`;
      x.textAlign = 'center';
      x.textBaseline = 'middle';
      x.fillText(emoji, size / 2, size / 2);
      return new THREE.CanvasTexture(c);
    }

    // ── SOUND EFFECTS (Web Audio API — no files needed) ──────────────
    let audioCtx;
    function getAudioCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }

    const SFX = {
      // Soft pop — gift box click
      pop() {
        const ctx = getAudioCtx();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(600, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(150, ctx.currentTime + 0.15);
        gain.gain.setValueAtTime(0.3, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
        osc.connect(gain).connect(ctx.destination);
        osc.start(); osc.stop(ctx.currentTime + 0.2);
      },

      // Whoosh — lid opening / swoosh
      whoosh() {
        const ctx = getAudioCtx();
        const bufSize = ctx.sampleRate * 0.4;
        const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufSize);
        const src = ctx.createBufferSource();
        src.buffer = buf;
        const filter = ctx.createBiquadFilter();
        filter.type = 'bandpass';
        filter.frequency.setValueAtTime(800, ctx.currentTime);
        filter.frequency.exponentialRampToValueAtTime(2000, ctx.currentTime + 0.15);
        filter.frequency.exponentialRampToValueAtTime(400, ctx.currentTime + 0.35);
        filter.Q.value = 2;
        const gain = ctx.createGain();
        gain.gain.setValueAtTime(0.2, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
        src.connect(filter).connect(gain).connect(ctx.destination);
        src.start(); src.stop(ctx.currentTime + 0.4);
      },

      // Spring boing — envelope popping out
      boing() {
        const ctx = getAudioCtx();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(220, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(880, ctx.currentTime + 0.08);
        osc.frequency.exponentialRampToValueAtTime(330, ctx.currentTime + 0.25);
        osc.frequency.exponentialRampToValueAtTime(440, ctx.currentTime + 0.35);
        gain.gain.setValueAtTime(0.25, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
        osc.connect(gain).connect(ctx.destination);
        osc.start(); osc.stop(ctx.currentTime + 0.4);
      },

      // Snap — wax seal breaking
      snap() {
        const ctx = getAudioCtx();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(1200, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(80, ctx.currentTime + 0.08);
        gain.gain.setValueAtTime(0.15, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
        osc.connect(gain).connect(ctx.destination);
        osc.start(); osc.stop(ctx.currentTime + 0.1);
        // Add a little crackle
        const bufSize = ctx.sampleRate * 0.06;
        const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufSize, 3);
        const src = ctx.createBufferSource();
        src.buffer = buf;
        const g2 = ctx.createGain();
        g2.gain.setValueAtTime(0.2, ctx.currentTime);
        g2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.06);
        src.connect(g2).connect(ctx.destination);
        src.start(); src.stop(ctx.currentTime + 0.06);
      },

      // Magical chime — letter reveal
      chime() {
        const ctx = getAudioCtx();
        const notes = [523, 659, 784, 1047]; // C5, E5, G5, C6
        notes.forEach((freq, i) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'sine';
          osc.frequency.value = freq;
          const start = ctx.currentTime + i * 0.1;
          gain.gain.setValueAtTime(0, start);
          gain.gain.linearRampToValueAtTime(0.15, start + 0.03);
          gain.gain.exponentialRampToValueAtTime(0.001, start + 0.6);
          osc.connect(gain).connect(ctx.destination);
          osc.start(start); osc.stop(start + 0.6);
        });
      },

      // Soft sparkle — stickers appearing
      sparkle() {
        const ctx = getAudioCtx();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(2000, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(4000, ctx.currentTime + 0.05);
        osc.frequency.exponentialRampToValueAtTime(1500, ctx.currentTime + 0.15);
        gain.gain.setValueAtTime(0.08, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
        osc.connect(gain).connect(ctx.destination);
        osc.start(); osc.stop(ctx.currentTime + 0.2);
      },

      // Confetti pop burst — multi-note bright spread
      confettiPop() {
        const ctx = getAudioCtx();
        const notes = [880, 1100, 1320, 1760];
        notes.forEach((freq, i) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'triangle';
          osc.frequency.value = freq;
          const t0 = ctx.currentTime + i * 0.04;
          gain.gain.setValueAtTime(0, t0);
          gain.gain.linearRampToValueAtTime(0.12, t0 + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.001, t0 + 0.25);
          osc.connect(gain).connect(ctx.destination);
          osc.start(t0); osc.stop(t0 + 0.28);
        });
        // Noise burst layer
        const buf = ctx.createBuffer(1, ctx.sampleRate * 0.12, ctx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / data.length, 2);
        const src = ctx.createBufferSource(); src.buffer = buf;
        const g2 = ctx.createGain(); g2.gain.setValueAtTime(0.18, ctx.currentTime);
        src.connect(g2).connect(ctx.destination); src.start();
      }
    };

    // ── OBJECTS ──────────────────────────────────────────────────────
    const giftGroup = new THREE.Group();
    scene.add(giftGroup);
    let lidPivot, giftClickables = [];

    // Base Ground — darker tinted disc + shadow layer
    const gndBase = new THREE.Mesh(
      new THREE.CircleGeometry(25, 64),
      new THREE.MeshStandardMaterial({ color: 0xffd6e0, roughness: 1, metalness: 0 })
    );
    gndBase.rotation.x = -Math.PI / 2;
    gndBase.position.y = -0.002;
    gndBase.receiveShadow = true;
    scene.add(gndBase);

    const gnd = new THREE.Mesh(new THREE.CircleGeometry(25, 64), new THREE.ShadowMaterial({ opacity: 0.25 }));
    gnd.rotation.x = -Math.PI / 2;
    gnd.receiveShadow = true;
    scene.add(gnd);

    // Gradient ground ring (inner lighter, outer darker)
    const gndGradRing = new THREE.Mesh(
      new THREE.RingGeometry(3, 25, 64),
      new THREE.MeshStandardMaterial({
        color: 0xffecf0, roughness: 1, metalness: 0,
        transparent: true, opacity: 0.35
      })
    );
    gndGradRing.rotation.x = -Math.PI / 2;
    gndGradRing.position.y = 0.001;
    scene.add(gndGradRing);

    // ── BACKGROUND BLOBS (soft pastel shapes, very far back) ─────────
    const bgBlobs = [];
    const blobData = [
      { x: -8, y: 5, z: -12, s: 4.5, color: 0xffb3c6, speed: 0.15 },
      { x: 7, y: 7, z: -15, s: 5.5, color: 0xffc2d1, speed: 0.12 },
      { x: -5, y: 9, z: -18, s: 6, color: 0xffd6e0, speed: 0.1 },
      { x: 3, y: 3, z: -10, s: 3, color: 0xfff0f5, speed: 0.18 },
      { x: -10, y: 2, z: -14, s: 4, color: 0xff8fab, speed: 0.13 },
      { x: 9, y: 0, z: -16, s: 5, color: 0xffc0cb, speed: 0.11 },
      // extra blobs for more depth
      { x: -3, y: 11, z: -20, s: 7, color: 0xffd6e0, speed: 0.08 },
      { x: 5, y: -2, z: -9, s: 3.5, color: 0xffecf1, speed: 0.20 },
      { x: 0, y: 8, z: -22, s: 8, color: 0xffc2d1, speed: 0.07 },
    ];
    blobData.forEach(d => {
      const blobMat = new THREE.MeshBasicMaterial({
        color: d.color, transparent: true, opacity: 0.08  // dimmed so background recedes
      });
      const blob = new THREE.Mesh(new THREE.SphereGeometry(d.s, 24, 24), blobMat);
      blob.position.set(d.x, d.y, d.z);
      blob.scale.set(1, 0.6, 0.8);
      blob.userData = { baseX: d.x, baseY: d.y, speed: d.speed, phase: Math.random() * 6.28 };
      scene.add(blob);
      bgBlobs.push(blob);
    });

    // ── BACKGROUND DECORATIVE GIFT BOXES ─────────────────────────────
    const bgGiftBoxes = [];
    const bgGiftData = [
      { x: -3.2, y: 0, z: -3.5, s: 0.55, box: 0xffc2d1, ribbon: 0xffd700 },  // left-back, gold ribbon
      { x:  3.0, y: 0, z: -3.0, s: 0.48, box: 0xffb3c6, ribbon: 0xffffff },  // right-back, white ribbon
      { x: -4.5, y: 0, z: -2.0, s: 0.38, box: 0xffd6e0, ribbon: 0xff8fab },  // far left, pink ribbon
      { x:  4.2, y: 0, z: -2.5, s: 0.42, box: 0xffc2d1, ribbon: 0xffd6e0 },  // far right, soft ribbon
    ];
    bgGiftData.forEach(d => {
      const g = new THREE.Group();
      // Box body
      const body = new THREE.Mesh(
        new THREE.BoxGeometry(1, 0.9, 1),
        new THREE.MeshStandardMaterial({ color: d.box, roughness: 0.8, metalness: 0, transparent: true, opacity: 0.7 })
      );
      body.position.y = 0.45;
      g.add(body);
      // Lid (slightly wider)
      const lid = new THREE.Mesh(
        new THREE.BoxGeometry(1.05, 0.22, 1.05),
        new THREE.MeshStandardMaterial({ color: d.box, roughness: 0.75, metalness: 0, transparent: true, opacity: 0.7 })
      );
      lid.position.y = 0.9 + 0.11;
      g.add(lid);
      // Ribbon horizontal
      const ribH = new THREE.Mesh(
        new THREE.BoxGeometry(0.12, 0.96, 1.02),
        new THREE.MeshStandardMaterial({ color: d.ribbon, roughness: 0.5, metalness: 0.05, transparent: true, opacity: 0.85 })
      );
      ribH.position.y = 0.45; g.add(ribH);
      // Ribbon vertical
      const ribV = new THREE.Mesh(
        new THREE.BoxGeometry(1.02, 0.96, 0.12),
        new THREE.MeshStandardMaterial({ color: d.ribbon, roughness: 0.5, metalness: 0.05, transparent: true, opacity: 0.85 })
      );
      ribV.position.y = 0.45; g.add(ribV);
      // Bow (small sphere on top)
      const bow = new THREE.Mesh(
        new THREE.SphereGeometry(0.15, 8, 8),
        new THREE.MeshStandardMaterial({ color: d.ribbon, roughness: 0.4, metalness: 0.1, transparent: true, opacity: 0.9 })
      );
      bow.position.y = 1.14; g.add(bow);

      g.position.set(d.x, d.y, d.z);
      g.scale.setScalar(d.s);
      g.userData = { baseY: d.y, phase: Math.random() * 6.28, rotSpeed: (Math.random() - 0.5) * 0.004 };
      g.castShadow = false;
      scene.add(g);
      bgGiftBoxes.push(g);
    });

    // ── LETTER DROP SHADOW (fake plane, fades in with letter) ────────────
    const letterShadowMat = new THREE.MeshBasicMaterial({
      color: 0x4a1030, transparent: true, opacity: 0, depthWrite: false
    });
    const letterShadow = new THREE.Mesh(
      new THREE.CircleGeometry(1.0, 32),
      letterShadowMat
    );
    letterShadow.rotation.x = -Math.PI / 2;
    letterShadow.position.set(0, 0.01, 3.5); // just above ground, below letter
    letterShadow.renderOrder = 3;
    scene.add(letterShadow);

    // ── RADIAL GLOW PLANE (softly glows behind letter when revealed) ─
    const glowPlaneMat = new THREE.MeshBasicMaterial({
      color: 0xffd6e0, transparent: true, opacity: 0, side: THREE.DoubleSide, depthWrite: false
    });
    const glowPlane = new THREE.Mesh(new THREE.PlaneGeometry(6, 8), glowPlaneMat);
    glowPlane.position.set(0, 2.2, 2.8); // sits just behind letter
    glowPlane.renderOrder = 22;
    scene.add(glowPlane);

    // ── FOREGROUND FLOATING ELEMENTS (different Z depths) ────────────
    const fgFloaters = [];
    const floaterData = [
      // LEFT side — varied depth + size
      { e: '💗', x: -5.5, y: 2.2, z: 1.5, s: 0.85, sy: 0.45, sx: 0.28 },
      { e: '🌸', x: -4.0, y: 4.0, z: -0.5, s: 0.55, sy: 0.35, sx: 0.18 },
      { e: '⭐', x: -6.5, y: 1.0, z: 3.0, s: 0.65, sy: 0.55, sx: 0.22 },
      // RIGHT side — varied depth + size

    // ── ANIMATION LOGIC ──────────────────────────────────────────────
    function handleInteraction() {
      switch (step) {
        case 0:

          if (window.playMusicOnce) window.playMusicOnce();
          SFX.pop();

          // Click-bounce micro-interaction: squish → spring back
          anim.gSY.target = 0.93;
          anim.gSX.target = 1.07;
          setTimeout(() => { anim.gSY.target = 1.0; anim.gSX.target = 1.0; }, 120);

          setTimeout(() => {
            // Lid flies open
            SFX.whoosh();
            SFX.confettiPop(); // 🎉 pop burst sound
            anim.lR.target = -2.6;
            anim.gI.target = 2.8;
            envGroup.visible = true;
            spawnPfx(20);
            spawnConfetti(42); // confetti burst
            // Start background fireworks after box opens
            fwActive = true;
            spawnFirework(); // first one immediately

            setTimeout(() => {
              hint.textContent = 'Tap to pop the envelope out ✉️';
              hint.style.color = '#ffcf33';  // warm gold
              hint.classList.remove('hidden');
            }, 800);
          }, 150);
          break;

        case 1:
          step = 2; hint.classList.add('hidden');

          // Anticipation: Envelope moves slightly down (compresses)
          anim.eY.target = 1.3;

          setTimeout(() => {
            // Action: Jump up fast
            SFX.boing(); // spring pop sound
            anim.eY.target = 3.2;
            anim.eRZ.target = (Math.random() - 0.5) * 0.15; // Random nice tilt
            spawnPfx(15);

            setTimeout(() => { hint.textContent = 'Tap the seal to open 🕊️'; hint.style.color = '#ffc147'; hint.classList.remove('hidden'); }, 1000);  // amber gold
          }, 200);
          break;

        case 2:
          step = 3; hint.classList.add('hidden');

          // ── PHASE 1: Open the flap ──────────────────────────────────
          SFX.snap(); // seal break
          anim.fR.target = -Math.PI;
          spawnPfx(20);

          // Seed letter INSIDE envelope in scene-space (no hierarchy clipping)
          letterMesh.visible = true;
          anim.lV.val = 0; anim.lV.target = 0;   // hidden until pop
          anim.lY.val = anim.eY.val; anim.lY.target = anim.eY.val;
          anim.lZ.val = envGroup.position.z + 0.05; // Slightly in front — no z-fight
          anim.lZ.target = envGroup.position.z + 0.05;

          // ── PHASE 2: Auto-pop letter once flap is ~70% open (~700 ms) ──
          setTimeout(() => {
            step = 4; // skip step 3 click — no second-click needed
            hint.classList.add('hidden');

            // Anticipation: nudge letter down
            anim.lY.target = anim.eY.val - 0.4;

            setTimeout(() => {
              // JUMP: letter flies up & toward camera
              // Letter is 4.2 units tall; raise Y so bottom edge (Y - 2.1) clears ground
              SFX.chime(); // magical reveal
              anim.lY.target = 2.2;
              anim.lZ.target = 3.2;
              anim.lRZ.target = (Math.random() - 0.5) * 0.1;
              anim.lV.target = 1.0;  // fade in as it pops
              anim.lI.target = 2.5;
              anim.tI.target = 2.0;
              spawnPfx(35);

              stickers.forEach((s, i) => setTimeout(() => {
                s.visible = true; s.userData.active = true;
                SFX.sparkle(); // tiny sparkle per sticker
                let op = 0;
                const fi = setInterval(() => {
                  op = Math.min(op + .05, 1);
                  s.material.opacity = op;
                  if (op >= 1) clearInterval(fi);
                }, 40);
              }, 300 + i * 150));
            }, 160); // brief anticipation hold
          }, 700); // wait for flap to swing open ~70%
          break;
      }
    }

    // Click/Touch Detection (pointer events for cross-device)
    const ptr = new THREE.Vector2(), ray = new THREE.Raycaster();
    renderer.domElement.addEventListener('pointerdown', e => {
      e.preventDefault();
      ptr.set((e.clientX / window.innerWidth) * 2 - 1, -(e.clientY / window.innerHeight) * 2 + 1);
      ray.setFromCamera(ptr, camera);

      const hitsGift = ray.intersectObjects(giftClickables, true).length;
      const hitsEnv = ray.intersectObjects(envClickables, true).length;

      if (step === 0 && hitsGift) handleInteraction();
      else if (step === 1 && (hitsGift || hitsEnv)) handleInteraction();
      else if (step === 2 && hitsEnv) handleInteraction();
      // step 3 & 4: letter auto-pops — no click needed
    });

    // Resize
    window.addEventListener('resize', onResize);

    // ── PARALLAX — Desktop (pointermove) + Mobile (DeviceOrientation) ──
    let mouseX = 0, mouseY = 0;
    let targetX = 0, targetY = 0;   // shared smooth targets used by camera
    let usingGyro = false;          // true once orientation events are firing

    // ── DESKTOP: pointer / mouse move ───────────────────────────────
    const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent)
      || (navigator.maxTouchPoints > 1 && 'ontouchstart' in window);

    if (!isMobile) {
      document.addEventListener('pointermove', e => {
        mouseX = (e.clientX / innerWidth) * 2 - 1;
        mouseY = -(e.clientY / innerHeight) * 2 + 1;
        targetX = mouseX;
        targetY = mouseY;
      });
    }

    // ── MOBILE: DeviceOrientation ────────────────────────────────────
    function handleOrientation(event) {
      if (event.gamma === null || event.beta === null) return;
      usingGyro = true;
      const tiltX = event.gamma;   // left/right  −90…+90°
      const tiltY = event.beta;    // front/back   −180…+180°
      // Map to the same ±1 range as mouse parallax, then scale
      targetX =  Math.max(-1, Math.min(1, tiltX  / 45)) * 0.9;
      targetY = -Math.max(-1, Math.min(1, (tiltY - 30) / 45)) * 0.5; // offset 30° = natural hold angle
    }

    function startOrientation() {
      window.addEventListener('deviceorientation', handleOrientation);
      document.getElementById('tilt-btn').style.display = 'none';
    }

    if (isMobile) {
      if (typeof DeviceOrientationEvent !== 'undefined') {
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
          // iOS 13+ — must request after a user gesture
          const tiltBtn = document.getElementById('tilt-btn');
          tiltBtn.style.display = 'block';
          tiltBtn.addEventListener('click', () => {
            DeviceOrientationEvent.requestPermission()
              .then(response => {
                if (response === 'granted') {
                  startOrientation();
                } else {
                  tiltBtn.textContent = '🚫 Tilt denied';
                  setTimeout(() => { tiltBtn.style.display = 'none'; }, 2000);
                }
              })
              .catch(err => {
                console.warn('DeviceOrientation permission error:', err);
                tiltBtn.style.display = 'none';
              });
          });
        } else {
          // Android / non-iOS — no permission needed
          startOrientation();
        }
      }
      // If DeviceOrientationEvent is not supported at all, parallax stays static (targetX/Y = 0)
    }

    // ── MOBILE: Touch-drag parallax (fallback when gyro unavailable / supplement) ──
    // Runs on all touch devices; gyro values override targetX/Y when usingGyro is true
    if (isMobile) {
      window.addEventListener('touchmove', e => {
        if (usingGyro) return; // gyro takes priority
        const touch = e.touches[0];
        const x = (touch.clientX / window.innerWidth  - 0.5) * 2;  // −1 … +1
        const y = (touch.clientY / window.innerHeight - 0.5) * 2;  // −1 … +1
        targetX =  x * 0.5;   // gentle horizontal shift
        targetY = -y * 0.3;   // gentle vertical shift (inverted so dragging up = camera up)
      }, { passive: true });
    }

    // Loop
    const clock = new THREE.Clock();
    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();

      Object.values(anim).forEach(s => s.update());

      // Responsive parallax — desktop uses mouseX/Y; mobile uses targetX/Y from gyro
      const px = deviceCfg.parallax, py = deviceCfg.parallaxY;
      // On mobile without gyro support, targetX/Y stay 0 → static camera
      camera.position.x += (targetX * px - camera.position.x) * 0.05;
      camera.position.y += (deviceCfg.camY + targetY * py - camera.position.y) * 0.05;
      camera.lookAt(0, 1.0, 0);

      // Apply Spring values + hover glow
      if (step === 0) {
        // Hover detection
        const hoverRay = new THREE.Raycaster();
        const hoverPtr = new THREE.Vector2(mouseX, mouseY);
        hoverRay.setFromCamera(hoverPtr, camera);
        const isHover = hoverRay.intersectObjects(giftClickables, true).length > 0;
        giftHoverScale = lerp(giftHoverScale, isHover ? 1.03 : 1.0, 0.08);
        giftLight.intensity = lerp(giftLight.intensity, isHover ? 1.5 : 0, 0.08);
        renderer.domElement.style.cursor = isHover ? 'pointer' : 'default';
      }
      const hS = step === 0 ? giftHoverScale : 1.0;
      giftGroup.scale.set(anim.gSX.val * hS, anim.gSY.val * hS, anim.gSX.val * hS);

      if (step === 0) { giftGroup.position.y = Math.sin(t * 1.5) * .1; giftGroup.rotation.y = Math.sin(t * .8) * .03; }

      lidPivot.rotation.x = anim.lR.val;

      envGroup.position.y = anim.eY.val + (step >= 2 ? Math.sin(t * 1.4) * .06 : 0);
      envGroup.rotation.z = anim.eRZ.val;

      envFlapPivot.rotation.x = anim.fR.val;

      if (letterMesh.visible) {
        // Letter is ALWAYS in scene-space (never clipped by envelope geometry)
        // step 3  → seeded inside envelope, hidden (opacity=0), awaiting pop
        // step 4+ → fully animated out toward camera
        const inEnv = step === 3;  // tucked inside, fading in during flap open
        const lFloat = step >= 4 ? Math.sin(t * .6) * .03 : 0;
        const lBob = step >= 4 ? Math.sin(t * 1.4) * .04 : 0;
        const lS = step >= 4
          ? 1.0 + Math.sin(t * 2.0) * 0.008   // gentle breathe when out
          : 0.75;                               // small when tucked in

        letterMesh.position.set(
          lFloat,
          anim.lY.val + lBob,
          anim.lZ.val
        );
        letterMesh.scale.setScalar(lS);
        letterMesh.rotation.y = step >= 4 ? Math.sin(t * .5) * .02 : 0;
        letterMesh.rotation.z = anim.lRZ.val;
        letterMesh.material.opacity = anim.lV.val;
      }

      // Stickers apply 
      stickers.forEach(s => {
        if (s.userData.active) {
          s.position.y = s.userData.baseY + anim.lY.val + Math.sin(t * 1.3 + s.userData.phase) * .1;
          s.position.z = anim.lZ.val + .25;
          s.material.rotation = s.userData.rotZ + anim.lRZ.val + Math.sin(t * .8 + s.userData.phase) * .1;
        }
      });

      giftLight.intensity = anim.gI.val;
      letterLight.intensity = anim.lI.val;
      topLamp.intensity = anim.tI.val;

      // Particles
      pfxPool.forEach((p, i) => {
        if (!p.userData.alive) return;
        p.position.y += p.userData.vy; p.position.x += p.userData.vx + Math.sin(p.userData.life * .03) * .005;
        const pr = p.userData.life / p.userData.maxLife; p.material.opacity = pr < .1 ? pr / .1 : pr > .8 ? 1 - (pr - .8) / .2 : 1;
        if (++p.userData.life > p.userData.maxLife) { scene.remove(p); p.userData.alive = false; pfxPool.splice(i, 1); }
      });

      // Fireworks — update + cleanup
      for (let i = fwPool.length - 1; i >= 0; i--) {
        const f = fwPool[i];
        if (!f.userData.alive) continue;
        f.position.x += f.userData.vx;
        f.position.y += f.userData.vy;
        f.position.z += f.userData.vz;
        f.userData.vy -= 0.001; // gentle gravity
        f.userData.life++;
        const fp = f.userData.life / f.userData.maxLife;
        f.material.opacity = fp < 0.15 ? fp / 0.15 * 0.9 : 0.9 * (1 - fp);
        if (f.userData.life >= f.userData.maxLife) {
          scene.remove(f);
          f.material.map.dispose(); f.material.dispose();
          f.userData.alive = false;
          fwPool.splice(i, 1);
        }
      }

      // Confetti physics — gravity + rotation + fade + cleanup
      for (let i = confettiPool.length - 1; i >= 0; i--) {
        const c = confettiPool[i];
        if (!c.userData.alive) continue;
        const d = c.userData;
        d.vy -= 0.0022; // gravity
        c.position.x += d.vx;
        c.position.y += d.vy;
        c.position.z += d.vz;
        c.rotation.x += d.rx;
        c.rotation.y += d.ry;
        c.rotation.z += d.rz;
        d.life++;
        // Fade out in last 30% of life
        const prog = d.life / d.maxLife;
        c.material.opacity = prog > 0.7 ? 0.92 * (1 - (prog - 0.7) / 0.3) : 0.92;
        if (d.life > d.maxLife) {
          scene.remove(c);
          c.geometry.dispose();
          c.material.dispose();
          d.alive = false;
          confettiPool.splice(i, 1);
        }
      }

      // Background gift boxes — gentle float + slow rotation
      bgGiftBoxes.forEach(g => {
        const d = g.userData;
        g.position.y = d.baseY + Math.sin(t * 0.6 + d.phase) * 0.06;
        g.rotation.y += d.rotSpeed;
      });

      // Background blobs — very slow drift
      bgBlobs.forEach(b => {
        const d = b.userData;
        b.position.x = d.baseX + Math.sin(t * d.speed + d.phase) * 0.8;
        b.position.y = d.baseY + Math.sin(t * d.speed * 0.7 + d.phase) * 0.5;
      });

      // Foreground floaters — gentle bob + sway
      fgFloaters.forEach(f => {
        const d = f.userData;
        f.position.x = d.baseX + Math.sin(t * d.speedX + d.phase) * d.ampX;
        f.position.y = d.baseY + Math.sin(t * d.speedY + d.phase) * d.ampY;
        f.material.rotation = Math.sin(t * 0.5 + d.phase) * 0.15;
      });

      // Ambient drift particles — always floating
      ambientPfx.forEach(p => {
        const d = p.userData;
        p.position.y += d.vy;
        p.position.x += d.vx + Math.sin(t * d.drift + d.phase) * 0.002;
        // Reset when too high
        if (p.position.y > 10) {
          p.position.y = -2;
          p.position.x = d.baseX + (Math.random() - 0.5) * 4;
        }
        p.material.opacity = 0.2 + Math.sin(t * 0.8 + d.phase) * 0.12;
      });

      // ── CINEMATIC LIGHTING (step 4: letter reveal) ──────────────────
      // Stage spotlight — soft cone from above (only lights gift/env; letter is MeshBasicMaterial)
      stageSpot.intensity = lerp(stageSpot.intensity, step >= 4 ? 0.45 : 0, 0.03);
      stageSpot.target.position.set(0, anim.lY.val, anim.lZ.val);
      stageSpot.target.updateMatrixWorld();

      // Letter drop shadow — fades in beneath letter
      letterShadowMat.opacity = lerp(letterShadowMat.opacity, step >= 4 ? 0.18 : 0, 0.04);
      letterShadow.position.set(0, 0.02, anim.lZ.val + 0.3);

      // Glow halo behind letter — soft presence (not a wash)
      glowPlaneMat.opacity = lerp(glowPlaneMat.opacity, step >= 4 ? 0.18 : 0, 0.03);
      glowPlane.position.y = lerp(glowPlane.position.y, step >= 4 ? anim.lY.val + 0.2 : 2.2, 0.05);
      glowPlane.position.z = lerp(glowPlane.position.z, step >= 4 ? anim.lZ.val - 0.5 : 2.8, 0.05);

      // Letter point-glow — off-axis fill (not front-blasting)
      letterGlow.intensity = lerp(letterGlow.intensity, step >= 4 ? 0.12 : 0, 0.04);
      letterGlow.position.set(-2, anim.lY.val + 1.5, anim.lZ.val + 1.0);

      // letterLight strictly off during letter phase (state machine still uses it pre-step 4)
      if (step < 4) letterLight.intensity = anim.lI.val;
      else letterLight.intensity = 0;

      // Gift box subtle breathing when idle
      const breathScale = 1.0 + Math.sin(t * 0.9) * 0.008;
      if (step === 0) giftGroup.scale.multiplyScalar(breathScale / (anim.gSX.val));

      // Subtle camera breathing (device-aware base Z)
      const camBreath = Math.sin(t * 0.6) * 0.04;
      camera.position.z = lerp(camera.position.z, deviceCfg.camZ + camBreath, 0.03);

      renderer.render(scene, camera);
    }
    animate();

    // ── AUDIO ────────────────────────────────────────────────────────
    // playMusicOnce: safe to call from anywhere; idempotent after first success.
    // We do NOT reset musicStarted on catch — a network blip shouldn't reopen the gate.
    window.playMusicOnce = () => {
      if (musicStarted) return;
      musicStarted = true;
      bgMusic.volume = 0.4;
      bgMusic.play()
        .then(() => musicBtn.classList.add('playing'))
        .catch(err => {
          // Autoplay still blocked (shouldn't happen after user gesture, but be safe)
          console.warn('Music play failed:', err);
          // Reset so the next genuine gesture can retry
          musicStarted = false;
        });
    };

    // Start music on very first interaction anywhere — covers mobile tap on canvas
    window.addEventListener('pointerdown', () => playMusicOnce(), { once: true });

    // Music toggle button
    musicBtn.addEventListener('click', () => {
      if (!musicStarted) { playMusicOnce(); return; }
      if (bgMusic.paused) {
        bgMusic.play();
        musicBtn.classList.add('playing');
        musicBtn.textContent = '🎵';
      } else {
        bgMusic.pause();
        musicBtn.classList.remove('playing');
        musicBtn.textContent = '🔇';
      }
    });
    spawnPfx(Math.min(10, deviceCfg.maxPfx));
    setInterval(() => { if (step >= 1) spawnPfx(Math.min(3, deviceCfg.maxPfx - pfxPool.length)); }, 1500);
    // Background fireworks — every 2.5–4s after box opens, capped at 28 particles total
    setInterval(() => {
      if (!fwActive) return;
      if (fwPool.length < 28) spawnFirework();
    }, 2500 + Math.random() * 1500);
  </script>
</body>

</html>
